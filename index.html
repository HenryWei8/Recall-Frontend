<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Archive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #05080f;
      --surface:      #0c0f1c;
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(80,150,255,0.45);
      --text:         #e2e6f0;
      --text-muted:   #64718a;
      --accent:       #4a8cff;
      --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100vh;
      overflow-y: auto;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    #app-header {
      position: sticky; top: 0; z-index: 40;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      background: rgba(5,8,15,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex; align-items: center; gap: 11px;
    }
    .brand-glyph {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #4a8cff 0%, #9060e8 100%);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }
    .brand-name {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .brand-tagline {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    #drawer-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px;
      background: var(--accent);
      color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: var(--font);
      letter-spacing: 0.01em;
      transition: background 0.15s, transform 0.1s;
    }
    #drawer-toggle:hover  { background: #5a9bff; }
    #drawer-toggle:active { transform: scale(0.97); }

    /* ── Gallery ────────────────────────────────────────────────────────── */
    #gallery-section {
      max-width: 1360px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    .section-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .section-heading {
      font-size: 26px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.025em;
      margin-bottom: 32px;
    }

    #gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    /* ── Empty state ────────────────────────────────────────────────────── */
    .gallery-empty {
      grid-column: 1 / -1;
      padding: 90px 20px;
      text-align: center;
    }
    .gallery-empty-icon {
      font-size: 40px;
      margin-bottom: 18px;
      opacity: 0.12;
    }
    .gallery-empty p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 270px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Capsule card ───────────────────────────────────────────────────── */
    .capsule-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      outline: none;
      transition: border-color 0.22s, transform 0.22s, box-shadow 0.22s;
      animation: cardIn 0.38s ease both;
    }
    .capsule-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-5px);
      box-shadow: 0 18px 52px rgba(0,0,0,0.55), 0 0 0 1px rgba(80,150,255,0.09);
    }
    .capsule-card:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74,140,255,0.3);
    }
    .capsule-card:active {
      transform: translateY(-2px);
      transition-duration: 0.08s;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .capsule-preview {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: #080a14;
    }
    .capsule-preview video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.9;
      transition: transform 0.5s ease, opacity 0.25s ease;
    }
    .capsule-card:hover .capsule-preview video {
      transform: scale(1.05);
      opacity: 1;
    }

    .capsule-hover-layer {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0);
      transition: background 0.22s ease;
    }
    .capsule-card:hover .capsule-hover-layer {
      background: rgba(0,0,0,0.22);
    }

    .capsule-cta {
      padding: 9px 20px;
      background: rgba(74,140,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(8px) scale(0.95);
      transition: opacity 0.22s ease, transform 0.22s ease;
      white-space: nowrap;
    }
    .capsule-card:hover .capsule-cta {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .capsule-info {
      padding: 13px 16px 15px;
    }
    .capsule-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }
    .capsule-meta {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .capsule-date {
      font-size: 12px;
      color: var(--text-muted);
    }
    .capsule-sep {
      width: 3px; height: 3px;
      background: var(--text-muted);
      border-radius: 50%;
      opacity: 0.35;
      flex-shrink: 0;
    }
    .capsule-tag {
      font-size: 10px;
      font-weight: 600;
      color: rgba(74,140,255,0.75);
      background: rgba(74,140,255,0.08);
      border: 1px solid rgba(74,140,255,0.16);
      border-radius: 4px;
      padding: 2px 6px;
      letter-spacing: 0.06em;
    }

    /* ── Chamber overlay ────────────────────────────────────────────────── */
    #chamber-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: #000;
      display: flex; flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    #chamber-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #chamber-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }

    #chamber-topbar {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%);
    }

    #chamber-back {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 15px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.8);
      font-size: 13px; font-weight: 400;
      cursor: pointer; font-family: var(--font);
      transition: background 0.15s, color 0.15s;
    }
    #chamber-back:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    #chamber-title-text {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
      max-width: 38%;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #chamber-hint {
      position: absolute; bottom: 22px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
      pointer-events: none;
      white-space: nowrap;
    }

    #chamber-loading {
      position: absolute; inset: 0; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
    }
    .chamber-spinner {
      width: 28px; height: 28px;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-top-color: rgba(74,140,255,0.75);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text {
      font-size: 11px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.14em;
    }

    /* ── Drawer ─────────────────────────────────────────────────────────── */
    #drawer-overlay {
      position: fixed; inset: 0; z-index: 90;
      pointer-events: none;
    }
    #drawer-overlay.active { pointer-events: all; }

    #drawer-panel {
      position: fixed; top: 0; right: 0; z-index: 95;
      width: 380px; height: 100vh;
      background: rgba(7,9,17,0.98);
      border-left: 1px solid var(--border);
      transform: translateX(380px);
      display: flex; flex-direction: column;
      font-family: var(--font);
      color: var(--text);
      overflow-y: auto;
    }

    .drawer-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-header h3 {
      font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.1em; color: #7a8aa8;
      text-transform: uppercase;
    }
    .drawer-close {
      background: none; border: none; color: #4a5568;
      font-size: 1.1rem; cursor: pointer;
      transition: color 0.15s; line-height: 1;
    }
    .drawer-close:hover { color: var(--text); }

    .drawer-body {
      padding: 20px; flex: 1;
      display: flex; flex-direction: column; gap: 14px;
    }

    .field label {
      display: block; font-size: 0.7rem; font-weight: 600;
      color: #4a5568; margin-bottom: 5px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .field input[type="text"],
    .field input[type="number"] {
      width: 100%; padding: 8px 10px;
      background: rgba(255,255,255,0.04); color: var(--text);
      border: 1px solid rgba(255,255,255,0.09); border-radius: 6px;
      font-size: 0.88rem; outline: none; font-family: var(--font);
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: rgba(74,140,255,0.5); }
    .field input[type="file"] { display: none; }

    .file-pick-btn {
      width: 100%; padding: 10px;
      background: rgba(255,255,255,0.03); color: #6b7a99;
      border: 1px dashed rgba(255,255,255,0.1); border-radius: 6px;
      font-size: 0.84rem; cursor: pointer; text-align: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .file-pick-btn:hover { border-color: rgba(74,140,255,0.4); color: var(--text); }
    .file-name { font-size: 0.72rem; color: #5a9cf0; margin-top: 4px; min-height: 1em; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    details.intrinsics summary {
      font-size: 0.72rem; color: #4a5568; cursor: pointer; padding: 4px 0;
      list-style: none; display: flex; align-items: center; gap: 6px;
    }
    details.intrinsics summary::before { content: '▶'; font-size: 0.5rem; display: inline-block; }
    details.intrinsics[open] summary::before { transform: rotate(90deg); }
    details.intrinsics[open] summary { color: #6b7a99; margin-bottom: 10px; }

    .submit-btn {
      width: 100%; padding: 12px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s, transform 0.1s;
    }
    .submit-btn:hover:not(:disabled)  { background: #5a9bff; }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .progress { height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); width: 0; transition: width 0.4s ease; }

    #drawer-log {
      background: rgba(0,0,0,0.45); border-radius: 6px; padding: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.66rem; color: #4ade80;
      max-height: 130px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      min-height: 36px;
    }

    .download-btn {
      width: 100%; padding: 10px;
      background: rgba(22,163,74,0.15); color: #4ade80;
      border: 1px solid rgba(22,163,74,0.25); border-radius: 8px;
      font-size: 0.85rem; cursor: pointer; text-align: center;
      text-decoration: none; display: none;
    }
    .download-btn.visible { display: block; }
  </style>
</head>
<body>

  <!-- ── Gallery ────────────────────────────────────────────────────────── -->
  <div id="app">
    <header id="app-header">
      <div class="brand">
        <div class="brand-glyph">M</div>
        <div>
          <div class="brand-name">Memory Archive</div>
          <div class="brand-tagline">3D time capsule gallery</div>
        </div>
      </div>
      <button id="drawer-toggle">+ Add Memory</button>
    </header>

    <main id="gallery-section">
      <p class="section-eyebrow">Archive</p>
      <h2 class="section-heading">Your memories</h2>
      <div id="gallery-grid"></div>
    </main>
  </div>

  <!-- ── Chamber (3D viewer, full-screen overlay) ───────────────────────── -->
  <div id="chamber-overlay">
    <canvas id="chamber-canvas"></canvas>

    <div id="chamber-topbar">
      <button id="chamber-back">← Gallery</button>
      <span id="chamber-title-text"></span>
      <div style="width:104px"></div><!-- spacer to centre title -->
    </div>

    <div id="chamber-hint">Drag to orbit · Scroll to zoom · ESC to exit</div>

    <div id="chamber-loading">
      <div class="chamber-spinner"></div>
      <span id="loading-text">LOADING</span>
    </div>
  </div>

  <!-- ── Drawer (slide-in panel) ──────────────────────────────────────── -->
  <div id="drawer-overlay"></div>
  <div id="drawer-panel"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
